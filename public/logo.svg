<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Versión SIN nombre - Solo el logo -->
  <g id="logo-only">
    <!-- Monitor/Pantalla con estilo minimalista - centrado en el canvas -->
    <rect x="250" y="150" width="300" height="200" rx="20" fill="url(#screenGradient)" stroke="#1A1A1A" stroke-width="6"/>
    <rect x="350" y="350" width="100" height="20" rx="8" fill="#1A1A1A"/>
    
    <!-- Líneas de conexión con efecto fluido -->
    <path d="M320 220 C 370 170, 420 230, 470 150" stroke="url(#line1Gradient)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M350 240 C 400 190, 450 250, 490 200" stroke="url(#line2Gradient)" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M370 260 C 420 210, 470 270, 510 250" stroke="url(#line3Gradient)" stroke-width="10" stroke-linecap="round" fill="none"/>
    
    <!-- Puntos terminales con efecto resplandor -->
    <circle cx="470" cy="150" r="12" fill="url(#dot1Gradient)"/>
    <circle cx="490" cy="200" r="12" fill="url(#dot2Gradient)"/>
    <circle cx="510" cy="250" r="12" fill="url(#dot3Gradient)"/>
  </g>
  
  <!-- Definición de gradientes -->
  <defs>
    <!-- Gradiente para la pantalla -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F2C"/>
      <stop offset="100%" stop-color="#1E2D4A"/>
    </linearGradient>
    
    <!-- Gradientes para las líneas -->
    <linearGradient id="line1Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06BCF9"/>
      <stop offset="100%" stop-color="#23F0C7"/>
    </linearGradient>
    
    <linearGradient id="line2Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C72CB"/>
      <stop offset="100%" stop-color="#CB69C1"/>
    </linearGradient>
    
    <linearGradient id="line3Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB5B5A"/>
      <stop offset="100%" stop-color="#F8B056"/>
    </linearGradient>
    
    <!-- Gradientes para los puntos -->
    <radialGradient id="dot1Gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#23F0C7"/>
      <stop offset="100%" stop-color="#06BCF9"/>
    </radialGradient>
    
    <radialGradient id="dot2Gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#CB69C1"/>
      <stop offset="100%" stop-color="#6C72CB"/>
    </radialGradient>
    
    <radialGradient id="dot3Gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#F8B056"/>
      <stop offset="100%" stop-color="#FB5B5A"/>
    </radialGradient>
  </defs>
</svg>
